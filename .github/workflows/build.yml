name: Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Image Tags
        id: image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tags=${GITHUB_REF_NAME},latest,sha-${short_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=alpha,sha-${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: GHCR Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ steps.image.outputs.tags }}
          push: ${{ steps.image.outputs.push }}
          runCmd: node --version && npm --version && pnpm --version && codex --version && claude --version && lsb_release -ds
