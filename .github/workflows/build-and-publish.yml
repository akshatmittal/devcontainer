name: Build and Publish Dev Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build dev container image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tags
        id: image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "push=always" >> "$GITHUB_OUTPUT"
            echo "tags=${GITHUB_REF_NAME},latest,sha-${short_sha}" >> "$GITHUB_OUTPUT"
          else
            echo "push=never" >> "$GITHUB_OUTPUT"
            echo "tags=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        if: steps.image.outputs.push == 'always'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dev container
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ steps.image.outputs.tags }}
          push: ${{ steps.image.outputs.push }}
          runCmd: node --version && npm --version && lsb_release -ds
